<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Python Practicals | Tiny Buttons</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f7fc;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 1.2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* header minimal */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0f2b3d, #1e4a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .header p {
      font-size: 0.7rem;
      color: #2c3e50;
      background: #e9edf2;
      display: inline-block;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      margin-top: 0.3rem;
    }

    /* ultra compact grid — many small buttons */
    .micro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
      margin-top: 1rem;
    }

    /* tiny button (chip style) */
    .micro-btn {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 1.2rem;
      padding: 0.5rem 0.3rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .micro-btn:hover {
      background: #eef2ff;
      border-color: #3b82f6;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    }

    .micro-btn:active {
      transform: translateY(1px);
    }

    .prac-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #2563eb;
      background: #eef2ff;
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 30px;
      letter-spacing: 0.2px;
    }

    .prac-name {
      font-size: 0.7rem;
      font-weight: 600;
      color: #0f172a;
      margin-top: 0.25rem;
      white-space: nowrap;
      overflow-x: hidden;
      text-overflow: ellipsis;
    }

    .copy-badge {
      font-size: 0.55rem;
      color: #3b82f6;
      margin-top: 0.2rem;
      display: flex;
      justify-content: center;
      gap: 3px;
      align-items: center;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      background: #0f172ad9;
      backdrop-filter: blur(12px);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.65rem;
      color: #5b6e8c;
      border-top: 1px solid #cbd5e180;
      padding-top: 1rem;
    }

    @media (max-width: 640px) {
      .micro-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.5rem;
      }
      .prac-name {
        font-size: 0.65rem;
        white-space: normal;
        word-break: keep-all;
      }
    }
  </style>
</head>

  // toast
  const toast = document.getElementById('toastMsg');
  let toastTimer = null;
  function showToast(msg = "📋 copied!") {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.style.opacity = "1";
    toast.style.transform = "translateX(-50%) scale(1)";
    toastTimer = setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transform = "translateX(-50%) scale(0.95)";
    }, 1300);
  }

  async function copyCode(code, pracId) {
    try {
      await navigator.clipboard.writeText(code);
      showToast(`✅ Prac ${pracId} copied`);
    } catch (err) {
      const textarea = document.createElement('textarea');
      textarea.value = code;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast(`📋 Prac ${pracId} copied`);
    }
  }

  const microGrid = document.getElementById('microGrid');
  practicals.forEach(prac => {
    const btn = document.createElement('button');
    btn.className = 'micro-btn';
    
    const numSpan = document.createElement('div');
    numSpan.className = 'prac-num';
    numSpan.textContent = `#${prac.id}`;
    
    const nameSpan = document.createElement('div');
    nameSpan.className = 'prac-name';
    nameSpan.textContent = prac.shortName;
    
    const copySpan = document.createElement('div');
    copySpan.className = 'copy-badge';
    copySpan.innerHTML = `📋 copy`;
    
    btn.appendChild(numSpan);
    btn.appendChild(nameSpan);
    btn.appendChild(copySpan);
    
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      copyCode(prac.code, prac.id);
    });
    
    microGrid.appendChild(btn);
  });
